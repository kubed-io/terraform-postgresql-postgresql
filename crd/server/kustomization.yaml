apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: postgresql-server-crd
namespace: data
labels:
- pairs:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/component: server
    app.kubernetes.io/name: postgresql-provider
resources:
- definition.yaml
- composition.yaml
configMapGenerator:
- name: provider
  files:
  - providerconfig.yaml.tpl
  options:
    annotations:
      config.kubernetes.io/local-config: "true"
replacements:
- source:
    kind: ConfigMap
    name: provider
    fieldPath: data.providerconfig\.yaml\.tpl
  targets:
  - select:
      kind: Composition
    fieldPaths:
    - spec.pipeline.[step=render-provider-config].input.inline.template
generatorOptions:
  disableNameSuffixHash: true
