apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: servers.postgresql.kubed.io
spec:
  compositeTypeRef:
    apiVersion: postgresql.kubed.io/v1alpha1
    kind: Server
  mode: Pipeline
  pipeline:

  # Step 1: render the ProviderConfig.
  # Template content is in providerconfig.yaml.tpl — kustomize copies it here via replacements.
  - step: render-provider-config
    functionRef:
      name: go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: "# replaced by kustomize"

  # Step 2: declare ExtraResources for matching LDAP Entries, then build the Workspace.
  # go-templating processes ExtraResources in the same function invocation:
  # pass 1 declares the requirement (.extraResources is empty, roles = static only).
  # pass 2 Crossplane has fetched the entries and .extraResources is populated.
  - step: render-workspace
    functionRef:
      name: go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $xr   := .observed.composite.resource }}
          {{- $spec := $xr.spec }}
          {{- $name := $xr.metadata.name }}

          {{/* Select ONE Client by clientSelector (first match wins). */}}
          {{- if $spec.clientSelector }}
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ExtraResources
          requirements:
            clients:
              apiVersion: ldap.kubed.io/v1alpha1
              kind: Client
              matchLabels:
              {{- range $k, $v := $spec.clientSelector.matchLabels }}
                {{ $k }}: "{{ $v }}"
              {{- end }}
          ---
          {{- end }}

          {{- $observed := .observed.resources | default dict }}
          {{- $ws := index $observed "workspace" }}
          {{- $pc := index $observed "provider-config" }}
          {{- if or (and $ws $ws.resource.status.atProvider.outputs.roles) (and $pc $pc.resource.status.users) }}
          apiVersion: postgresql.kubed.io/v1alpha1
          kind: Server
          metadata:
            name: {{ $name }}
          status:
            {{- if and $ws $ws.resource.status.atProvider.outputs.roles }}
            roles: {{ $ws.resource.status.atProvider.outputs.roles | toJson }}
            {{- end }}
            {{- if and $pc $pc.resource.status.users }}
            resourceCount: {{ $pc.resource.status.users }}
            {{- end }}
          ---
          {{- end }}

          {{- if not $spec.purge }}
          {{-   $staticRoles := $spec.roles | default list }}

          {{/* Read the selected Client's published members + default role. */}}
          {{-   $client      := dict }}
          {{-   if .extraResources }}
          {{-     with index .extraResources "clients" }}
          {{-       if .items }}{{ $client = (index .items 0).resource }}{{ end }}
          {{-     end }}
          {{-   end }}
          {{-   $members     := dig "status" "members"      list $client }}
          {{-   $defaultRole := dig "status" "defaultRole"  ""   $client }}
          {{-   $ownerDn     := dig "status" "selectedOwner" ""  $client }}
          {{-   $clientRoles := dig "spec"   "roles"        list $client }}

          {{/* tree: default-role members -> top-level login roles; every NON-default declared client-role -> a no-login parent role (always, even empty); its members nest under it; owner excluded; dup names created once */}}
          {{-   $derived := list }}
          {{-   $seen    := dict }}

          {{/* 1) one structural parent role per DECLARED non-default client-role (source of truth = client spec.roles, so the role exists even with no members) */}}
          {{-   range $cr := $clientRoles }}
          {{-     if ne $cr.name $defaultRole }}
          {{-       $derived = append $derived (dict "name" $cr.name "privileges" (dict "login" false)) }}
          {{-       $seen = set $seen $cr.name true }}
          {{-     end }}
          {{-   end }}

          {{/* 2) member login roles — default first (top-level), then nested. Owner skipped. */}}
          {{-   range $pass := (list "default" "nested") }}
          {{-     range $m := $members }}
          {{-       if ne $m.dn $ownerDn }}
          {{-         $r   := $m.role | default $defaultRole }}
          {{-         $isDefault := or (eq $r "") (eq $r $defaultRole) }}
          {{-         if or (and (eq $pass "default") $isDefault) (and (eq $pass "nested") (not $isDefault)) }}
          {{/* role name = uid RDN of the member DN (uid=n8n,ou=... -> n8n) */}}
          {{-           $rdn  := index (splitList "," $m.dn) 0 }}
          {{-           $rname := trimPrefix "uid=" $rdn }}
          {{-           if not (hasKey $seen $rname) }}
          {{-             $seen = set $seen $rname true }}
          {{-             $role := dict "name" $rname "privileges" (dict "login" true) }}
          {{-             if not $isDefault }}{{ $role = set $role "roles" (list $r) }}{{ end }}
          {{-             $derived = append $derived $role }}
          {{-           end }}
          {{-         end }}
          {{-       end }}
          {{-     end }}
          {{-   end }}

          {{-   $allRoles := concat $staticRoles $derived | default list }}
          ---
          apiVersion: opentofu.upbound.io/v1beta1
          kind: Workspace
          metadata:
            name: {{ $name }}.server.postgresql
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: workspace
              gotemplating.fn.crossplane.io/ready: "True"
              crossplane.io/external-name: {{ $name }}-server
          spec:
            providerConfigRef:
              name: {{ $name }}
            forProvider:
              source: Remote
              module: github.com/kubed-io/terraform-postgresql-postgresql//modules/server?ref=main
              varmap:
                roles: {{ $allRoles | toJson }}
          {{- end }}
