apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: servers.postgresql.kubed.io
spec:
  compositeTypeRef:
    apiVersion: postgresql.kubed.io/v1alpha1
    kind: Server
  mode: Pipeline
  pipeline:

  # Step 1: render the ProviderConfig.
  # Template content is in providerconfig.yaml.tpl — kustomize copies it here via replacements.
  - step: render-provider-config
    functionRef:
      name: go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: "# replaced by kustomize"

  # Step 2: declare ExtraResources for matching LDAP Entries, then build the Workspace.
  # go-templating processes ExtraResources in the same function invocation:
  # pass 1 declares the requirement (.extraResources is empty, roles = static only).
  # pass 2 Crossplane has fetched the entries and .extraResources is populated.
  - step: render-workspace
    functionRef:
      name: go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $xr   := .observed.composite.resource }}
          {{- $spec := $xr.spec }}
          {{- $name := $xr.metadata.name }}
          {{- if $spec.serviceAccountSelector }}
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ExtraResources
          requirements:
            serviceaccounts:
              apiVersion: ldap.kubed.io/v1alpha1
              kind: ServiceAccount
              matchLabels:
              {{- range $k, $v := $spec.serviceAccountSelector.matchLabels }}
                {{ $k }}: "{{ $v }}"
              {{- end }}
          ---
          {{- end }}
          {{- $ws := index .observed.resources "workspace" }}
          {{- $pc := index .observed.resources "provider-config" }}
          {{- if or (and $ws $ws.resource.status.atProvider.outputs.roles) (and $pc $pc.resource.status.users) }}
          apiVersion: postgresql.kubed.io/v1alpha1
          kind: Server
          metadata:
            name: {{ $name }}
          status:
            {{- if and $ws $ws.resource.status.atProvider.outputs.roles }}
            roles: {{ $ws.resource.status.atProvider.outputs.roles | toJson }}
            {{- end }}
            {{- if and $pc $pc.resource.status.users }}
            resourceCount: {{ $pc.resource.status.users }}
            {{- end }}
          ---
          {{- end }}
          {{- if not $spec.purge }}
          {{-   $staticRoles := $spec.roles | default list }}
          {{-   $saRoles     := list }}
          {{-   if .extraResources }}
          {{-     with index .extraResources "serviceaccounts" }}
          {{-       range $e := .items }}
          {{-         $saRoles = append $saRoles (dict "name" $e.resource.metadata.name) }}
          {{-       end }}
          {{-     end }}
          {{-   end }}
          {{-   $allRoles := concat $staticRoles $saRoles | default list }}
          ---
          apiVersion: opentofu.upbound.io/v1beta1
          kind: Workspace
          metadata:
            name: {{ $name }}.server.postgresql
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: workspace
              gotemplating.fn.crossplane.io/ready: "True"
              crossplane.io/external-name: {{ $name }}-server
          spec:
            providerConfigRef:
              name: {{ $name }}
            forProvider:
              source: Remote
              module: github.com/kubed-io/terraform-postgresql-postgresql//modules/server?ref=main
              varmap:
                roles: {{ $allRoles | toJson }}
          {{- end }}
