apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: servers.postgresql.kubed.io
spec:
  scope: Cluster
  group: postgresql.kubed.io
  names:
    kind: Server
    plural: servers
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - host
            - credentialsRef
            properties:
              host:
                type: string
                description: Hostname or IP of the PostgreSQL server.
              port:
                type: integer
                description: Port the PostgreSQL server listens on.
                default: 5432
              sslmode:
                type: string
                description: SSL mode for the connection.
                default: disable
                enum:
                - disable
                - require
                - verify-ca
                - verify-full
              credentialsRef:
                type: object
                description: |
                  Reference to a Secret with username and password keys.
                  The composition assembles the full provider credentials from these
                  values combined with host, port, and sslmode from this spec.
                required:
                - namespace
                - name
                properties:
                  namespace:
                    type: string
                  name:
                    type: string
              serviceAccountSelector:
                type: object
                description: |
                  Selects ldap.kubed.io ServiceAccount CRDs by label to provision as login
                  roles on this server. Any ServiceAccount matching all labels gets a postgres
                  role (login: true, name = service account name). Using different label keys
                  per server allows one ServiceAccount to be a login on multiple servers.
                properties:
                  matchLabels:
                    type: object
                    description: Labels that ServiceAccount resources must have to be included.
                    x-kubernetes-preserve-unknown-fields: true
              purge:
                type: boolean
                default: false
                description: |
                  When true, passes an empty roles list to OpenTofu so all managed roles
                  are destroyed on the next reconcile. Set this before deleting the Server
                  to ensure a clean terraform destroy with no leftover roles in the database.
              roles:
                type: array
                description: |
                  Static roles always provisioned on this server.
                  Merged with any roles derived from labeled LDAP Entries.
                default: []
                items:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                    connectionLimit:
                      type: integer
                      nullable: true
                      default: null
                    roles:
                      type: array
                      items:
                        type: string
                      nullable: true
                    privileges:
                      type: object
                      properties:
                        superuser:
                          type: boolean
                          default: false
                        inherit:
                          type: boolean
                          default: true
                        login:
                          type: boolean
                          default: true
                        replication:
                          type: boolean
                          default: false
                        createRole:
                          type: boolean
                          default: false
                        createDatabase:
                          type: boolean
                          default: false
          status:
            description: A Status represents the observed state
            type: object
            properties:
              resourceCount:
                description: Number of resources currently using this server's ProviderConfig.
                type: integer
              roles:
                description: Names of the roles currently managed on this server.
                type: array
                items:
                  type: string
              share:
                description: Freeform field containing status information
                type: object
                x-kubernetes-preserve-unknown-fields: true
